<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>物品貸出管理システム</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 20px;
            background-color: #f0f0f0;
        }
        h1, h2 {
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        select, input[type="text"], input[type="number"] {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            padding: 10px 15px;
            background-color: #007bff;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        ul {
            list-style: none;
            padding: 0;
        }
        li {
            padding: 10px;
            background: #f9f9f9;
            border-bottom: 1px solid #eee;
            margin-bottom: 5px;
            border-radius: 4px;
        }
        .flex-container {
            display: flex;
            gap: 20px;
        }
        .flex-child {
            flex: 1;
        }
        hr {
            margin: 30px 0;
            border: 0;
            border-top: 1px solid #ccc;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>和国物品管理システム WAO!</h1>
    
    <div class="flex-container">
        <!-- 申請フォーム -->
        <div class="flex-child">
            <h2>📝 貸出・返却申請</h2>
            <div class="form-group">
                <label for="groupType">区分</label>
                <select id="groupType" onchange="updateGroupSelect()">
                    <option value="クラス">クラス</option>
                    <option value="部活">部活</option>
                    <option value="委員会">委員会</option>
                </select>
            </div>
            <div class="form-group">
                <label for="groupName">団体名</label>
                <select id="groupName"></select>
            </div>
            <div class="form-group">
                <label for="itemName">物品名</label>
                <select id="itemName"></select>
            </div>
            <div class="form-group">
                <label for="itemCount">数量</label>
                <input type="number" id="itemCount" min="1" value="1">
            </div>
            <button onclick="submitAction('貸出')">貸出</button>
            <button onclick="submitAction('返却')" style="background-color: #6c757d;">返却</button>
        </div>

        <!-- 未返却ログ表示エリア -->
        <div class="flex-child">
            <h2>📋 未返却ログ</h2>
            <ul id="logList"></ul>
        </div>
    </div>

    <hr>

    <!-- 管理者画面設定 -->
    <h2>⚙️ 管理設定（制限・団体の追加）</h2>
    <div class="flex-container">
        <div class="flex-child">
            <h3>▼ 物品の個数制限設定</h3>
            <div class="form-group">
                <label for="newIdName">物品名</label>
                <input type="text" id="newIdName" placeholder="例: 絵の具">
            </div>
            <div class="form-group">
                <label for="newIdLimit">最大貸出可能数</label>
                <input type="number" id="newIdLimit" min="1" placeholder="例: 10">
            </div>
            <button onclick="addOrUpdateItem()">物品制限を登録・更新</button>
        </div>

        <div class="flex-child">
            <h3>▼ 部活・委員会の新規追加</h3>
            <div class="form-group">
                <label for="newGroupType">追加先区分</label>
                <select id="newGroupType">
                    <option value="部活">部活</option>
                    <option value="委員会">委員会</option>
                </select>
            </div>
            <div class="form-group">
                <label for="newGroupName">団体名</label>
                <input type="text" id="newGroupName" placeholder="例: 吹奏楽部">
            </div>
            <button onclick="addNewGroup()">団体を追加</button>
        </div>
    </div>

    <div style="margin-top: 20px;">
        <h3>📊 現在の物品制限一覧</h3>
        <ul id="itemLimitList"></ul>
    </div>
</div>

<script>
    // 初期データの定義
    const defaultItems = {
        "絵の具": 10,
        "プロジェクター": 3,
        "延長コード": 15
    };

    const defaultGroups = {
        "クラス": ["1年1組", "1年2組", "2年1組", "2年2組"],
        "部活": ["美術部", "剣道部"],
        "委員会": ["文化祭実行委員会", "生徒会"]
    };

    // 元々のストレージ名（items, groups, loans）に合わせて初期化
    if (!localStorage.getItem("items")) localStorage.setItem("items", JSON.stringify(defaultItems));
    if (!localStorage.getItem("groups")) localStorage.setItem("groups", JSON.stringify(defaultGroups));
    if (!localStorage.getItem("loans")) localStorage.setItem("loans", JSON.stringify([]));

    function getItems() { return JSON.parse(localStorage.getItem("items")); }
    function getGroups() { return JSON.parse(localStorage.getItem("groups")); }
    function getLoans() { return JSON.parse(localStorage.getItem("loans")); }

    // 画面全体の更新
    function initSystem() {
        updateGroupSelect();
        updateItemSelect();
        renderUnreturnedLog();
        renderItemLimitList();
    }

    function updateGroupSelect() {
        const type = document.getElementById("groupType").value;
        const groups = getGroups()[type] || [];
        const select = document.getElementById("groupName");
        select.innerHTML = groups.map(g => `<option value="${g}">${g}</option>`).join("");
    }

    function updateItemSelect() {
        const items = getItems();
        const select = document.getElementById("itemName");
        select.innerHTML = Object.keys(items).map(i => `<option value="${i}">${i}</option>`).join("");
    }

    function renderItemLimitList() {
        const items = getItems();
        const list = document.getElementById("itemLimitList");
        list.innerHTML = Object.entries(items).map(([name, limit]) => `<li>${name} (最大上限: ${limit}個)</li>`).join("");
    }

    // 【修正：ログの集計表示ロジック】
    // 「1年1組は〜」ではなく「吹奏楽部は絵の具を借りています」の形式で合算して出すように変更
    function renderUnreturnedLog() {
        const loans = getLoans();
        const list = document.getElementById("logList");
        
        const summary = {};

        loans.forEach(loan => {
            const group = loan.groupName;
            const item = loan.itemName;
            const count = parseInt(loan.count);

            if (!summary[group]) summary[group] = {};
            if (!summary[group][item]) summary[group][item] = 0;

            if (loan.type === "貸出") {
                summary[group][item] += count;
            } else if (loan.type === "返却") {
                summary[group][item] -= count;
            }
        });

        let html = "";
        Object.keys(summary).sort().forEach(group => {
            Object.entries(summary[group]).forEach(([item, count]) => {
                if (count > 0) {
                    html += `<li>🏢 <strong>${group}</strong> は <strong>${item}</strong> を借りています (${count}個)</li>`;
                }
            });
        });

        list.innerHTML = html || `<li style="color: #999;">未返却の物品はありません。</li>`;
    }

    // 貸出・返却の登録処理
    function submitAction(type) {
        const groupName = document.getElementById("groupName").value;
        const itemName = document.getElementById("itemName").value;
        const count = parseInt(document.getElementById("itemCount").value);

        if (!groupName || !itemName || isNaN(count) || count <= 0) {
            alert("入力を確認してください。");
            return;
        }

        if (type === "貸出") {
            const loans = getLoans();
            let currentBorrowed = 0;
            loans.forEach(l => {
                if (l.groupName === groupName && l.itemName === itemName) {
                    currentBorrowed += (l.type === "貸出" ? l.count : -l.count);
                }
            });

            const limit = getItems()[itemName] || 0;
            if (currentBorrowed + count > limit) {
                alert(`制限エラー: ${groupName}の${itemName}は最大${limit}個までしか借りられません。(現在${currentBorrowed}個借用中)`);
                return;
            }
        }

        const loans = getLoans();
        loans.push({ type, groupName, itemName, count });
        localStorage.setItem("loans", JSON.stringify(loans));
        
        initSystem();
        alert(`${type}を記録しました。`);
    }

    // 管理設定: 物品制限の更新
    function addOrUpdateItem() {
        const name = document.getElementById("newIdName").value.trim();
        const limit = parseInt(document.getElementById("newIdLimit").value);

        if (!name || isNaN(limit) || limit <= 0) {
            alert("正しい物品名と制限数を入力してください。");
            return;
        }

        const items = getItems();
        items[name] = limit;
        localStorage.setItem("items", JSON.stringify(items));

        document.getElementById("newIdName").value = "";
        document.getElementById("newIdLimit").value = "";

        initSystem();
        alert(`物品「${name}」の制限を ${limit} 個に更新・同期しました。`);
    }

    // 管理設定: 部活・委員会の追加
    function addNewGroup() {
        const type = document.getElementById("newGroupType").value;
        const name = document.getElementById("newGroupName").value.trim();

        if (!name) {
            alert("団体名を入力してください。");
            return;
        }

        const groups = getGroups();
        if (groups[type].includes(name)) {
            alert("既に登録されている団体です。");
            return;
        }

        groups[type].push(name);
        localStorage.setItem("groups", JSON.stringify(groups));

        document.getElementById("newGroupName").value = "";

        initSystem();
        alert(`${type}に「${name}」を追加・同期しました。`);
    }

    // 【新規機能：他端末同期用リスナー】
    // 元のストレージキー名（items, groups, loans）での変更を正確に検知
    window.addEventListener('storage', (e) => {
        if (e.key === "items" || e.key === "groups" || e.key === "loans") {
            initSystem();
        }
    });

    window.onload = initSystem;
</script>

</body>
</html>
